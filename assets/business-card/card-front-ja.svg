  <text x="6" y="47.1" font-family="'Helvetica Neue',Arial,sans-serif" font-size="2.5" fill="#E5E7EB">MAIL  hsugawara@kss-inc.jp</text>
  <text x="6" y="50.7" font-family="'Helvetica Neue',Arial,sans-serif" font-size="2.5" fill="#E5E7EB">WEB   kss-inc.jp</text>
