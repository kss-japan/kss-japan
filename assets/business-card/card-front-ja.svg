<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 91 55" width="910" height="550">
  <rect width="91" height="55" fill="#111827"/>
  <rect x="0" y="0" width="91" height="1.5" fill="#06B6D4"/>

  <defs>
    <linearGradient id="kgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0B5FA5"/>
    </linearGradient>
  </defs>

  <!-- Logo + company name (top row) -->
  <g transform="translate(6,5) scale(0.134)">
    <g fill="url(#kgrad)">
      <rect x="33" y="6" width="5" height="5"/>
      <rect x="24" y="2" width="4" height="4"/>
      <rect x="16" y="3" width="3.2" height="3.2" opacity="0.9"/>
      <rect x="9" y="7" width="2.8" height="2.8" opacity="0.8"/>
    </g>
    <text x="6" y="48" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="46" font-weight="900" fill="url(#kgrad)">K</text>
  </g>
  <text x="16" y="11.6" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="3.6" font-weight="700" fill="#FFFFFF">KSS株式会社</text>

  <!-- QR code (top-right) -->
  <image href="data:image/png;base64," x="74" y="6" width="11" height="11"/>

  <!-- Title / Name -->
  <text x="6" y="26.5" font-family="'Helvetica Neue',Arial,sans-serif" font-size="2.6" font-weight="500" fill="#06B6D4">CEO &amp; Founder</text>
  <text x="6" y="34" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">菅原 博史</text>

  <line x1="6" y1="38.5" x2="85" y2="38.5" stroke="#374151" stroke-width="0.3"/>

