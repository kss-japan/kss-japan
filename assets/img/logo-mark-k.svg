<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <defs>
    <linearGradient id="kgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0B5FA5"/>
    </linearGradient>
  </defs>
  <!-- scattered pixels (disperse effect) -->
  <g fill="url(#kgrad)">
    <rect x="33" y="6" width="5" height="5"/>
    <rect x="24" y="2" width="4" height="4"/>
    <rect x="16" y="1" width="3.2" height="3.2" opacity="0.9"/>
    <rect x="9" y="5" width="2.8" height="2.8" opacity="0.8"/>
    <rect x="4" y="11" width="2.4" height="2.4" opacity="0.7"/>
    <rect x="2" y="19" width="2" height="2" opacity="0.55"/>
    <rect x="20" y="9" width="2.4" height="2.4" opacity="0.6"/>
    <rect x="13" y="14" width="2" height="2" opacity="0.5"/>
  </g>
  <!-- K letterform -->
  <text x="6" y="48" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="46" font-weight="900" fill="url(#kgrad)">K</text>
</svg>
