<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56">
  <defs>
    <linearGradient id="kgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0B5FA5"/>
    </linearGradient>
  </defs>
  <!-- scattered pixels (disperse effect) -->
  <g fill="url(#kgrad)">
    <rect x="32" y="5" width="6" height="6"/>
    <rect x="22" y="1" width="5" height="5"/>
    <rect x="13" y="0" width="4" height="4" opacity="0.9"/>
    <rect x="5" y="4" width="3.4" height="3.4" opacity="0.8"/>
    <rect x="0" y="11" width="3" height="3" opacity="0.7"/>
    <rect x="19" y="8" width="3" height="3" opacity="0.65"/>
    <rect x="10" y="13" width="2.6" height="2.6" opacity="0.55"/>
  </g>
  <!-- S behind, peeking from under K -->
  <text x="15" y="53" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="46" font-weight="900" fill="#0B5FA5" opacity="0.65">S</text>
  <!-- K in front -->
  <text x="3" y="48" font-family="Arial, 'Helvetica Neue', sans-serif" font-size="48" font-weight="900" fill="url(#kgrad)">K</text>
</svg>
